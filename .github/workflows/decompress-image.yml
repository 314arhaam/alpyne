name: "Test decompressing images"

on: 
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  decompress_with_alpyne:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: alpine:latest
            #dir_name: IMG_alpine_latest
          - image_name: redis:latest
            #dir_name: IMG_redis_latest
          - image_name: python:3.14-slim
            #dir_name: IMG_python_3_14-slim
          - image_name: gcr.io/distroless/static-debian12
          #- image_name: mysql:latest
          #  dir_name: IMG_mysql_latest
          #- image_name: clickhouse/clickhouse-server
          #  dir_name: IMG_clickhouse_clickhouse-server
    runs-on: ubuntu-22.04
    steps:
      
      - uses: actions/checkout@v4
      
      - name: Check docker
        shell: bash
        run: |
          docker ps
      
      - name: Download and install tree
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y tree
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Go mod tidy
        run: go mod tidy
      
      - name: Build go binaries
        shell: bash
        run: GOOS='linux' GOARCH='amd64' CGO_ENABLED=0 go build -o alpyne ./cmd/main.go
      
      - name: Add execute permission
        shell: bash
        run: |
          ls -lh
          chmod +x ./alpyne
      
      - name: Pull ${{ matrix.image_name }}
        shell: bash
        run: docker pull ${{ matrix.image_name }}
      
      - name: Decompress ${{ matrix.image_name }}
        shell: bash
        run: |
          IMG_NAME=${{ matrix.image_name }}
          DIR_NAME="IMG_$(echo $IMG_NAME | sed s/"\."/_/g | sed s/"\/"/_/g | sed s/":"/_/g)"
          ./alpyne -i $IMG_NAME -k && tree -L 2 $DIR_NAME
