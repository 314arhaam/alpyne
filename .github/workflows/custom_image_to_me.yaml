name: "Custom Decompress"

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Name of the image to decompress'
        required: true
        type: string

jobs:
  decompress_with_alpyne:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check docker
        shell: bash
        run: |
          docker ps
      - name: Download and install tree and jq
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          sudo apt-get update && sudo apt-get install -y jq
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Go mod tidy
        working-directory: ./go
        run: go mod tidy
      - name: Build go binaries
        working-directory: ./go
        shell: bash
        run: |
          GOOS='linux' GOARCH='amd64' CGO_ENABLED=0 go build -o alpyne ./cmd/main.go
      - name: Add execute permission
        shell: bash
        run: |
          ls -lh
          chmod +x ./go/alpyne
      - name: Pull image
        shell: bash
        run: |
          docker pull ${{ github.event.inputs.image_name }}
      - name: Decompress image
        shell: bash
        run: |
          ./go/alpyne -i ${{ github.event.inputs.image_name }} > output.txt
      - name: Generate tree files
        shell: bash
        run: tree IMG_* > tree.txt && tree IMG_* -L 2 > tree_l2.txt
          # cat $(sudo find -name manifest.json $pwd | head -n 1) | jq > manifest.json

      - name: Send data to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_ME: ${{ secrets.TELEGRAM_CHAT_ID_ME }}
        run: |
          echo "Uploading data to Telegram..."
          IMG_NAME=${{ github.event.inputs.image_name }}
          CAPTION="*Image:* \`$IMG_NAME\`"
          # short
          curl -s -X POST \
            -F "chat_id=$TELEGRAM_CHAT_ID_ME" \
            -F "caption=$CAPTION" \
            -F "parse_mode=MarkdownV2" \
            -F "document=@tree_l2.txt" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
          # long
          curl -s -X POST \
            -F "chat_id=$TELEGRAM_CHAT_ID_ME" \
            -F "caption=$CAPTION" \
            -F "parse_mode=MarkdownV2" \
            -F "document=@tree.json" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
          # alpyne output
          curl -s -X POST \
            -F "chat_id=$TELEGRAM_CHAT_ID_ME" \
            -F "caption=$CAPTION" \
            -F "parse_mode=MarkdownV2" \
            -F "document=@output.txt" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
