name: build_and_release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name"
        required: true
        type: string

jobs:
  build_and_upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            bin: alpyne-linux-amd64
          - os: windows-latest
            goos: windows
            bin: alpyne-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            bin: alpyne-darwin-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go mod tidy
        working-directory: ./go
        run: go mod tidy
        
      - name: Build go binaries
        shell: bash
        working-directory: ./go
        run: |
          GOOS='${{ matrix.goos }}' GOARCH='amd64' CGO_ENABLED=0 go build -o '${{ matrix.bin }}' ./cmd/main.go

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}
          path: ${{ matrix.bin }}
          if-no-files-found: error

  create_release_and_upload_assets:
    needs: build_and_upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload linux
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/alpyne-linux-amd64/alpyne-linux-amd64
          asset_name: alpyne-linux-amd64
          asset_content_type: application/octet-stream

      - name: Upload macos
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/alpyne-darwin-amd64/alpyne-darwin-amd64
          asset_name: alpyne-darwin-amd64
          asset_content_type: application/octet-stream

      - name: Upload windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/alpyne-windows-amd64.exe/alpyne-windows-amd64.exe
          asset_name: alpyne-windows-amd64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
