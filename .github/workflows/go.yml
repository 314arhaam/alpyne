# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go mod tidy
        working-directory: ./go
        run: go mod tidy

      - name: Build binaries
        working-directory: ./go
        run: |
          # Build for 
          # Linux
          GOOS=linux GOARCH=amd64 go build -o ../alpyne-linux-amd64 ./cmd/main.go
          # macOS:
          GOOS=darwin GOARCH=amd64 go build -o ../alpyne-darwin-amd64 ./cmd/main.go
          # Windows:
          GOOS=windows GOARCH=amd64 go build -o ../alpyne-windows-amd64.exe ./cmd/main.go

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpyne-binaries 
          path: | 
            alpyne-linux-amd64
            alpyne-darwin-amd64
            alpyne-windows-amd64.exe
          retention-days: 7 # Optional: how long to keep the artifacts
